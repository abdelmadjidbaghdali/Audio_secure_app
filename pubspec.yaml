name: audio_secure_app
description: Secure Audio Application with Firebase & Biometric Auth

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0

  # Biometric Authentication
  local_auth: ^2.3.0

  # Audio
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  audioplayers: ^6.0.0

  # State Management
  provider: ^6.1.2

  # HTTP
  dio: ^5.4.3+1

  # Local Storage
  shared_preferences: ^2.2.3

  # Charts
  fl_chart: ^0.68.0

  # UI
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1

  cupertino_icons: ^1.0.6
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "file_00000000b85871f582691cb2829cfb44.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/images/